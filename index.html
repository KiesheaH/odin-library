    <title>My Library</title>

    <!-- HEADER -->
    <header class="header">
      <img
        src="img/logo.png"
        alt="Hot cup of tea sitting on a book"
        class="logo"
      />
      <h1>My Library</h1>
    </header>

    <!-- MODAL -->
    <div class="modal">
      <form action="" class="form">
        <!-- BOOK TITLE -->
        <div class="field">
          <label for="book-title" class="book-title">TITLE</label>
          <input type="text" id="book-title" required />
        </div>

        <!-- BOOK AUTHOR -->
        <div class="field">
          <label for="book-author" class="book-author">AUTHOR</label>
          <input type="text" id="book-author" required />
        </div>

        <!-- NUMBER OF PAGES -->
        <div class="field">
          <label for="page-count">NUMBER OF PAGES</label>
          <input type="number" id="page-count" required />
        </div>

        <!-- Publishing Date -->
        <div class="field">
          <label for="publishing-date">PUBLISHING DATE</label>
          <input type="date" id="publishing-date" required />
        </div>

        <!-- Buttons -->
        <div class="btns">
          <input type="submit" class="btn btn-add" />
          <input type="reset" class="btn btn-clear" />
        </div>
      </form>
    </div>
