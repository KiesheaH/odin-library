<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="img/logo.png" type="image/png" />
    <title>My Library</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- OVERLAY -->
    <div class="overlay">
      <div class="close">X</div>
    </div>
    <!-- HEADER -->
    <header class="header">
      <img
        src="img/logo.png"
        alt="Hot cup of tea sitting on a book"
        class="logo"
      />
      <h1>My Library</h1>
    </header>

    <!-- MODAL -->
    <div class="modal">
      <form action="" class="form">
        <!-- BOOK TITLE -->

        <div class="field">
          <label for="book-title" class="book-title"
            >TITLE <span class="asterisk">*</span></label
          >
          <input type="text" id="book-title" required />
        </div>

        <!-- BOOK AUTHOR -->
        <div class="field">
          <label for="book-author" class="book-author"
            >AUTHOR <span class="asterisk">*</span></label
          >
          <input type="text" id="book-author" required />
        </div>

        <!-- FORMAT -->
        <div class="field">
          <label for="book-format" class="book-format"
            >FORMAT <span class="asterisk">*</span></label
          >
          <select name="format" id="book-format" required>
            <option value="" selected></option>
            <option value="pdf">PDF</option>
            <option value="book">Book</option>
          </select>
        </div>

        <!-- NUMBER OF PAGES -->
        <div class="field">
          <label for="page-count"
            >NUMBER OF PAGES <span class="asterisk">*</span></label
          >
          <input type="number" id="page-count" required />
        </div>

        <!-- Publishing Date -->
        <div class="field">
          <label for="publishing-date"
            >PUBLISHING DATE <span class="asterisk">*</span></label
          >
          <input type="date" id="publishing-date" required />
        </div>

        <!-- Buttons -->
        <div class="btns">
          <input type="submit" class="btn btn-submit" />
          <input type="reset" class="btn btn-reset" />
        </div>
      </form>
    </div>

    <!-- MAIN -->
    <main class="main">
      <div class="card">
        <!-- BOOK INFO -->
        <div class="book">
          <div class="book-info">
            <h2 class="title">Title</h2>
            <div class="author">
              <p>by <span class="author-name">&nbsp;</span></p>
            </div>
            <p class="pages">Pages: <span class="count">&nbsp;</span></p>
          </div>
          <!-- PUBLISHING -->
          <div class="publishing">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
            >
              <path
                d="M23 5v13.883l-1 .117v-16c-3.895.119-7.505.762-10.002 2.316-2.496-1.554-6.102-2.197-9.998-2.316v16l-1-.117v-13.883h-1v15h9.057c1.479 0 1.641 1 2.941 1 1.304 0 1.461-1 2.942-1h9.06v-15h-1zm-12 13.645c-1.946-.772-4.137-1.269-7-1.484v-12.051c2.352.197 4.996.675 7 1.922v11.613zm9-1.484c-2.863.215-5.054.712-7 1.484v-11.613c2.004-1.247 4.648-1.725 7-1.922v12.051z"
              />
            </svg>
            <p>
              <span class="book-type">Book</span>,
              <span class="year">2026</span>
            </p>
          </div>

          <!-- RETURNED INFO -->
          <div class="return">
            <p>Returned on: <span class="date">&nbsp;</span></p>
            <div class="select-container">
              <select name="status" class="select-box">
                <option value="completed">Completed</option>
                <option value="not-started">Not Started</option>
                <option value="in-progress">In Progress</option>
              </select>
            </div>
          </div>
        </div>
      </div>
