<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="img/logo.png" type="image/png" />
    <title>My Library</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- OVERLAY -->
    <div class="overlay">
      <div class="close">X</div>
    </div>

    <!-- HEADER -->
    <header class="header">
      <img
        src="img/logo.png"
        alt="Hot cup of tea sitting on a book"
        class="logo"
      />
      <h1>My Library</h1>

      <!-- ADD BUTTON -->
      <div class="add">+</div>
    </header>

    <!-- MODAL -->
    <div class="modal">
      <form action="" class="form">
        <!-- BOOK TITLE -->

        <div class="field">
          <label for="book-title" class="book-title"
            >TITLE <span class="asterisk">*</span></label
          >
          <input type="text" id="book-title" required />
        </div>

        <!-- BOOK AUTHOR -->
        <div class="field">
          <label for="book-author" class="book-author"
            >AUTHOR <span class="asterisk">*</span></label
          >
          <input type="text" id="book-author" required />
        </div>

        <!-- FORMAT -->
        <div class="field">
          <label for="book-format" class="book-format"
            >FORMAT <span class="asterisk">*</span></label
          >
          <select name="format" id="book-format" required>
            <option value="" selected></option>
            <option value="Book">Book</option>
            <option value="PDF">PDF</option>
          </select>
        </div>

        <!-- NUMBER OF PAGES -->
        <div class="field">
          <label for="page-count"
            >NUMBER OF PAGES <span class="asterisk">*</span></label
          >
          <input type="number" id="page-count" min="0" required />
        </div>

        <!-- PUBLISHING DATE -->
        <div class="field">
          <label for="publishing-date"
            >PUBLISHING DATE <span class="asterisk">*</span></label
          >
          <input type="date" id="publishing-date" required />
        </div>

        <!-- Buttons -->
        <div class="btns">
          <input type="submit" class="btn btn-submit" />
          <input type="reset" class="btn btn-reset" />
        </div>
      </form>
    </div>

    <!-- MAIN -->
    <main class="main"></main>

    <!-- FOOTER -->
    <footer class="footer">
      <p class="copyright">&#169; 2026</p>

      <svg
        xmlns="http://www.w3.org/2000/svg"

        height="14"
        viewBox="0 0 24 24"

    <script src="script.js"></script>
  </body>
</html>
